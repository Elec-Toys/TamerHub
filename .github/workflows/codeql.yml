name: 'CodeQL'

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  OPENSHOCK_API_DOMAIN: api.openshock.app
  OPENSHOCK_FW_GIT_REF: ${{ github.ref }}
  OPENSHOCK_FW_GIT_COMMIT: ${{ github.sha }}
  OPENSHOCK_FW_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

jobs:
  get-vars:
    uses: ./.github/workflows/get-vars.yml

  analyze-js-py:
    name: Analyze JS/PY
    runs-on: 'ubuntu-latest'
    needs: get-vars
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write

    env:
      OPENSHOCK_FW_VERSION: ${{ needs.get-vars.outputs.version }}

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0

      # Build stuff here

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: '/language:${{matrix.language}}'

  analyze-cpp:
    name: Analyze C/C++
    runs-on: 'ubuntu-latest'
    needs: get-vars
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write

    env:
      language: 'c-cpp'
      OPENSHOCK_FW_VERSION: ${{ needs.get-vars.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: ${{ env.language }}

      - uses: ./.github/actions/build-firmware
        with:
          board: ci-build
          skip-checkout: true
          version: ${{ needs.get-vars.outputs.version }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: '/language:${{ env.language }}'
